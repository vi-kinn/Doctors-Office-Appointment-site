name: CI/CD Pipeline for Frontend and Backend

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      BACKEND_REPO_NAME: "doctor-office-backend"
      FRONTEND_REPO_NAME: "doctor-office-frontend"
      BACKEND_PATH: "./doctor-office-backend"
      FRONTEND_PATH: "./doctor-office-frontend"
      IMAGE_TAG: "latest"
      NAMESPACE: "midterm"  # Set your namespace here if needed

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      # Step 3: Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          region: ${{ secrets.AWS_REGION }}

      # Step 4: Build Backend Docker Image
      - name: Build Backend Docker image
        run: docker build -t ${{ env.BACKEND_REPO_NAME }} ${{ env.BACKEND_PATH }}

      # Step 5: Tag and Push Backend Docker Image
      - name: Tag and Push Backend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.BACKEND_REPO_NAME }} $ECR_REGISTRY/${{ env.BACKEND_REPO_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.BACKEND_REPO_NAME }}:${{ env.IMAGE_TAG }}

      # Step 6: Build, Tag, and Push Frontend Docker Image
      - name: Build Frontend Docker image
        run: docker build -t ${{ env.FRONTEND_REPO_NAME }} ${{ env.FRONTEND_PATH }}
        
      - name: Tag and Push Frontend Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.FRONTEND_REPO_NAME }} $ECR_REGISTRY/${{ env.FRONTEND_REPO_NAME }}:${{ env.IMAGE_TAG }}
          docker push $ECR_REGISTRY/${{ env.FRONTEND_REPO_NAME }}:${{ env.IMAGE_TAG }}

      # Step 7: Update kube config to connect to EKS
      - name: Update kube config
        run: aws eks update-kubeconfig --name group8

      # Step 8: Update Backend and Frontend Deployments in EKS
      - name: Update Backend Deployment with New Image
        run: |
          kubectl rollout restart backend -n $NAMESPACE  # Force restart
          kubectl rollout status backend -n $NAMESPACE

      - name: Update Frontend Deployment with New Image
        run: |
          kubectl rollout restart frontend -n $NAMESPACE  # Force restart
          kubectl rollout status frontend -n $NAMESPACE
